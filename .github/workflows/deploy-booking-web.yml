name: Deploy Fluxora Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/build-fluxora-v1
    paths:
      - .github/workflows/deploy-booking-web.yml
      - assets/**
      - lib/**
      - pubspec.lock
      - pubspec.yaml
      - web/**

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build web
        run: >-
          flutter build web --release
          --base-href /fluxora-agendamento/
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          --dart-define=PUBLIC_BOOKING_BASE_URL=https://terriblegeorge.github.io/fluxora-agendamento
          --dart-define=AUTH_WEB_REDIRECT_BASE_URL=https://terriblegeorge.github.io/fluxora-agendamento/

      - name: Publish compiled site
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          deploy_key: ${{ secrets.FLUXORA_PAGES_DEPLOY_KEY }}
          external_repository: TerribleGeorge/fluxora-agendamento
          publish_branch: gh-pages
          publish_dir: build/web
          force_orphan: true
